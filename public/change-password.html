<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — Signage Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%236366f1%22/><path d=%22M20 30h60v40H20z%22 fill=%22white%22 opacity=%22.9%22/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#6366f1;--glow:rgba(99,102,241,0.3);--text:#f1f1f3;--muted:#6b6b7a;--error:#f87171;--success:#34d399}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);pointer-events:none}
.card{position:relative;z-index:1;width:100%;max-width:420px;margin:24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;margin-bottom:16px;box-shadow:0 0 30px var(--glow)}
.logo-icon svg{width:26px;height:26px;fill:white}
h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;margin-bottom:8px}
.subtitle{font-size:14px;color:var(--muted);line-height:1.5}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.requirements{font-size:12px;color:var(--muted);margin-top:6px}
.req{display:flex;align-items:center;gap:6px;margin-top:4px}
.req-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .2s}
.req-dot.met{background:var(--success)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--error);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1>Set Your Password</h1>
    <p class="subtitle">Please set a new password to secure your account before continuing.</p>
  </div>

  <div id="err" class="err"></div>

  <form method="POST" action="/change-password">
    <div class="field">
      <label>New Password</label>
      <input type="password" name="newPassword" id="newPassword" required placeholder="At least 8 characters" oninput="checkReqs()">
      <div class="requirements">
        <div class="req"><div class="req-dot" id="req-len"></div><span>At least 8 characters</span></div>
        <div class="req"><div class="req-dot" id="req-num"></div><span>Contains a number</span></div>
        <div class="req"><div class="req-dot" id="req-upper"></div><span>Contains an uppercase letter</span></div>
      </div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirmPassword" id="confirmPassword" required placeholder="Re-enter your password" oninput="checkReqs()">
    </div>
    <button type="submit" class="btn" id="submit-btn" disabled>Set Password &amp; Continue</button>
  </form>
</div>

<script>
var p = new URLSearchParams(location.search);
var errEl = document.getElementById('err');
if (p.get('error') === 'short') {
  errEl.textContent = 'Password must be at least 8 characters.';
  errEl.style.display = 'block';
} else if (p.get('error') === 'mismatch') {
  errEl.textContent = 'Passwords do not match. Please try again.';
  errEl.style.display = 'block';
}

function checkReqs() {
  var pw = document.getElementById('newPassword').value;
  var cf = document.getElementById('confirmPassword').value;
  var lenOk = pw.length >= 8;
  var numOk = /[0-9]/.test(pw);
  var upperOk = /[A-Z]/.test(pw);
  document.getElementById('req-len').className = 'req-dot' + (lenOk ? ' met' : '');
  document.getElementById('req-num').className = 'req-dot' + (numOk ? ' met' : '');
  document.getElementById('req-upper').className = 'req-dot' + (upperOk ? ' met' : '');
  document.getElementById('submit-btn').disabled = !(lenOk && numOk && upperOk && pw === cf);
}
</script>
</body>
</html>
