<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Signage Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #11111a;
    --border: #1c1c2a;
    --accent: #f59e0b;
    --accent-glow: rgba(245,158,11,0.25);
    --text: #f1f1f3;
    --muted: #6b6b7a;
    --error: #f87171;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  body {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 380px; margin: 24px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 48px 36px; animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .logo-area { text-align: center; margin-bottom: 32px; }
  .badge {
    display: inline-block; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3);
    color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 5px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.06em; text-transform: uppercase; }
  input[type="text"], input[type="password"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .btn {
    width: 100%; padding: 12px; background: var(--accent); color: #000;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; border: none;
    border-radius: 8px; cursor: pointer; margin-top: 6px; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .error-msg {
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3);
    color: var(--error); border-radius: 8px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 18px; text-align: center;
  }
  .back-link { text-align: center; margin-top: 20px; font-size: 13px; }
  .back-link a { color: var(--muted); text-decoration: none; }
  .back-link a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="badge">Admin Access</div>
    <h1>Admin Panel</h1>
    <p class="subtitle">Manage clients, tokens, and screens</p>
  </div>
  <div id="error" class="error-msg" style="display:none">Invalid credentials.</div>
  <form method="POST" action="/admin/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="back-link"><a href="/login">← Back to client portal</a></div>
</div>
<script>
  if (location.search.includes('error=1')) document.getElementById('error').style.display = 'block';
</script>
</body>
</html>
