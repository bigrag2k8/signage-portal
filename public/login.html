<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AITS Signage Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23f97316%22/><text y=%22.9em%22 font-size=%2250%22 font-family=%22sans-serif%22 font-weight=%22bold%22 fill=%22white%22 x=%2250%25%22 text-anchor=%22middle%22>A</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#f97316;--glow:rgba(249,115,22,0.3);--accent-bg:rgba(249,115,22,0.1);--text:#f1f1f3;--muted:#6b6b7a;--error:#f87171}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(249,115,22,0.1) 0%,transparent 70%);pointer-events:none}
.card{position:relative;z-index:1;width:100%;max-width:420px;margin:24px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;animation:fadeUp 0.5s ease;box-shadow:0 24px 80px rgba(0,0,0,0.4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:36px}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:18px;margin-bottom:16px;box-shadow:0 0 40px var(--glow);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;color:white;letter-spacing:-0.5px}
.company-name{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--text);margin-bottom:4px}
.tagline{font-size:13px;color:var(--muted)}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
h2{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase}
input[type=text],input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#f97316,#ea580c);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;letter-spacing:.02em}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.99)}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--error);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;display:none;text-align:center}
.footer{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
.powered{text-align:center;margin-top:32px;font-size:11px;color:#333;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo-icon">AITS</div>
    <div class="company-name">AITS Signage Portal</div>
    <div class="tagline">Client Content Portal</div>
  </div>
  <hr class="divider">
  <h2>Sign In to Your Account</h2>
  <div id="err" class="err"></div>
  <form method="POST" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" required autofocus autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="footer">Need access? Contact your account manager.</div>
  <div class="powered">Powered by AITS Signage Portal</div>
</div>
<script>
var p = new URLSearchParams(location.search);
var errEl = document.getElementById('err');
if (p.get('error') === 'locked') {
  errEl.textContent = 'Account locked after too many failed attempts. Please try again in 15 minutes.';
  errEl.style.display = 'block';
} else if (p.get('error') === '1') {
  var attempts = parseInt(p.get('attempts') || '0');
  if (attempts >= 3) {
    errEl.textContent = 'Invalid credentials. Warning: ' + (5 - attempts) + ' attempt(s) remaining before lockout.';
  } else {
    errEl.textContent = 'Invalid username or password.';
  }
  errEl.style.display = 'block';
}
</script>
</body>
</html>
