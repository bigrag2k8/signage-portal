<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%236366f1%22/><path d=%22M20 30h60v40H20z%22 fill=%22white%22 opacity=%22.9%22/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Signage Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#6366f1;--glow:rgba(99,102,241,0.3);--text:#f1f1f3;--muted:#6b6b7a;--error:#f87171}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);pointer-events:none}
.card{position:relative;z-index:1;width:100%;max-width:400px;margin:24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;animation:fadeUp 0.5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;margin-bottom:16px;box-shadow:0 0 30px var(--glow)}
.logo-icon svg{width:26px;height:26px;fill:white}
h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;margin-bottom:6px}
.sub{font-size:14px;color:var(--muted)}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--error);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:20px;text-align:center;display:none}
.foot{text-align:center;margin-top:24px;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    </div>
    <h1>Client Portal</h1>
    <p class="sub">Sign in to publish your content</p>
  </div>
  <div id="err" class="err">Invalid username or password.</div>
  <form method="POST" action="/login">
    <div class="field"><label>Username</label><input type="text" name="username" required autofocus autocomplete="username"></div>
    <div class="field"><label>Password</label><input type="password" name="password" required autocomplete="current-password"></div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="foot">Need access? Contact your account manager.</div>
</div>
<script>
var p = new URLSearchParams(location.search);
var errEl = document.getElementById('err');
if (p.get('error') === 'locked') {
  errEl.textContent = 'Account locked after too many failed attempts. Please try again in 15 minutes.';
  errEl.style.display = 'block';
} else if (p.get('error') === '1') {
  var attempts = p.get('attempts');
  if (attempts && parseInt(attempts) >= 3) {
    errEl.textContent = 'Invalid credentials. Warning: ' + (5 - parseInt(attempts)) + ' attempt(s) remaining before lockout.';
  } else {
    errEl.textContent = 'Invalid username or password.';
  }
  errEl.style.display = 'block';
}
</script>
</body>
</html>
